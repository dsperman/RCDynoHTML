<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .bottom-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      line-height: 1.4;
      z-index: 2;
    }

    .bottom-text .main {
      font-size: 2.0rem;
      color: yellow;
      letter-spacing: 0.1em;
    }

    .bottom-text .sub {
      font-size: 0.7rem;
      color: yellow;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <video autoplay muted loop playsinline>
      <source src="RCDyno.mp4" type="video/mp4" />
      <source src="RCDyno.mov" type="video/quicktime" />
      Your browser does not support the video tag.
    </video>

    <div class="bottom-text">
      <div class="main">Coming Soon</div>
      <div class="sub">RCShockDyno@DSPerman.com</div>
    </div>
  </div>
</body>
</html>
